name: Deploy to Azure VM

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/paragon-group-limited/paragon-organic-fertilizer-updated

jobs:
  # ── Stage 1: Build the dev-mode image on GitHub runner and push to GHCR ─────
  # The image runs `next dev` (see Dockerfile.dev), so the build is just
  # `npm ci` + copy source — no `next build`, hence no database needed at build time.
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 2: Pull new image on the VM and restart ───────────────────────────
  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd ~/project/paragon-organic-fertilizer-updated
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            git pull origin main
            echo "=== Backing up the database before restart (safety net) ==="
            mkdir -p ~/backups
            docker exec pg-of pg_dump -U paragon -d paragon_organic \
              > ~/backups/paragon_organic_$(date +%Y%m%d_%H%M%S).sql || echo "WARN: backup skipped"
            # keep only the 10 most recent backups
            ls -1t ~/backups/paragon_organic_*.sql 2>/dev/null | tail -n +11 | xargs -r rm -f || true
            docker compose pull app
            docker compose up -d
            docker image prune -f
            echo "=== Waiting 25s for app to start ==="
            sleep 25
            echo "=== Container Status ==="
            docker compose ps || true
            echo "=== App Logs (last 150 lines) ==="
            docker compose logs app --tail=150 2>&1 || true
