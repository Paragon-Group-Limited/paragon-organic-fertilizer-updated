services:
  app:
    image: ghcr.io/paragon-group-limited/paragon-organic-fertilizer-updated:latest
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        - DATABASE_URL=postgresql://paragon:paragon123@localhost:5432/paragon_organic
        - PAYLOAD_SECRET=${PAYLOAD_SECRET:-paragon-secret-change-in-production}
    ports:
      - '3001:3001'
    environment:
      # Production build (next start): admin is pre-compiled in CI, so the VM stays
      # light and fast. Schema is synced separately by a one-shot dev container during
      # deploy (see .github/workflows/azure-deploy.yml), since prod disables push.
      - DATABASE_URL=postgresql://paragon:paragon123@pg-of:5432/paragon_organic
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    volumes:
      - media_data:/app/media
    depends_on:
      pg-of:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          # next start serves a pre-built app (no runtime compile), so it needs little
          # RAM. 768M is comfortable headroom for the Payload runtime.
          memory: 768M
        reservations:
          cpus: '0.1'
          memory: 256M

  pg-of:
    image: postgres:16-alpine
    container_name: pg-of
    environment:
      POSTGRES_DB: paragon_organic
      POSTGRES_USER: paragon
      POSTGRES_PASSWORD: paragon123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paragon -d paragon_organic']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

volumes:
  postgres_data:
  media_data:
