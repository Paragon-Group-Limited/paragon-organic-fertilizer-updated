services:
  app:
    image: ghcr.io/paragon-group-limited/paragon-organic-fertilizer-updated:latest
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3001:3001'
    environment:
      # Dev mode keeps Payload's `push: true` active so new collections/fields
      # auto-create their schema on startup (no manual migration step).
      - NODE_ENV=development
      - DATABASE_URL=postgresql://paragon:paragon123@pg-of:5432/paragon_organic
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    volumes:
      - media_data:/app/media
    depends_on:
      pg-of:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          # next dev compiles routes on demand, which spikes RAM. 768M caused the
          # container to thrash against its own limit (disk I/O, very slow pages).
          # The old working dev-mode setup used 1G; 1.25G gives the heavier
          # e-commerce build headroom while leaving the small VM room for others.
          memory: 1280M
        reservations:
          cpus: '0.1'
          memory: 256M

  pg-of:
    image: postgres:16-alpine
    container_name: pg-of
    environment:
      POSTGRES_DB: paragon_organic
      POSTGRES_USER: paragon
      POSTGRES_PASSWORD: paragon123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paragon -d paragon_organic']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

volumes:
  postgres_data:
  media_data:
